    <div class="post-content">
    <p>有种体验总被反复证明</p>
<p>带来希望之后，失望早已附着在</p>
<p>迟早要被揭穿，迟早</p>
<p>直到有天，失去她，我才弄明白</p>
<p>喜欢一个人的好，爱一个人的不足</p>
<p>&nbsp;</p>
<p>回忆反复横跳，决心要挽回</p>
<p>复活，复活</p>
<p>只要你满意现在的生活，哪怕后面无瓜葛</p>
<p>复活，复活</p>
